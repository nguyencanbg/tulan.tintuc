<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tin tức Phường Tự Lạn</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #f5f5f5; }
        .news-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; }
        .news-item:active { background: #f0f0f0; }
        .news-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #0068ff; }
        .news-date { font-size: 12px; color: #666; }
        .loading, .error { text-align: center; padding: 40px; color: #666; }
        .error { color: red; }
    </style>
</head>
<body>
    <div id="news-list" class="loading">Đang tải tin tức...</div>

    <script>
        // Hàm gọi API lấy bài viết từ Zalo OA (thông qua Vercel proxy)
        async function fetchNews() {
            try {
                // Sẽ thay bằng URL thật sau khi deploy proxy
                const proxyUrl = 'https://tulan-news-proxy.vercel.app/api/get-oa-posts';
                const response = await fetch(proxyUrl);
                const result = await response.json();
                if (result.success && result.data.length > 0) {
                    renderNews(result.data);
                } else {
                    document.getElementById('news-list').innerHTML = '<div class="error">Không có tin mới</div>';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('news-list').innerHTML = '<div class="error">Lỗi tải tin tức. Vui lòng thử lại sau.</div>';
            }
        }

        function renderNews(posts) {
            const container = document.getElementById('news-list');
            container.innerHTML = '';
            posts.forEach(post => {
                const item = document.createElement('div');
                item.className = 'news-item';
                item.onclick = () => {
                    // Mở link bài viết (nếu có) trong webview
                    if (post.link) window.location.href = post.link;
                    else if (post.url) window.location.href = post.url;
                };
                item.innerHTML = `
                    <div class="news-title">${escapeHtml(post.title || post.message || 'Bài viết')}</div>
                    <div class="news-date">${post.publishDate ? new Date(post.publishDate).toLocaleDateString('vi-VN') : ''}</div>
                `;
                container.appendChild(item);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        fetchNews();
    </script>
</body>
</html>
